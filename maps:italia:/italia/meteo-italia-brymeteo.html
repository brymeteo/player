<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Italia Meteo 3D</title>

<link rel="stylesheet"
href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#07111f;
  font-family:Inter,system-ui,sans-serif;
}

#map{position:absolute;inset:0;}

/* TOPBAR */
#topbar{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  display:flex;
  gap:10px;
  background:rgba(10,20,35,.72);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  padding:10px;
  border-radius:18px;
}

.top-btn{
  border:none;
  cursor:pointer;
  padding:10px 16px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  color:#d7e6ff;
  font-size:13px;
  font-weight:600;
}

.top-btn.active{
  background:#2596ff;
  color:white;
}

/* TIMELINE */
#timeline{
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  z-index:1000;
  width:min(720px,92vw);
  background:rgba(8,18,34,.75);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:18px 22px;
}

#hour-label{
  color:white;
  font-size:15px;
  margin-bottom:12px;
  font-weight:700;
  text-align:center;
}

input[type=range]{width:100%;}

/* MARKER */
.weather-marker{
  width:74px;
 
  border-radius:22px;
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
  transition:.16s;
  border:1px solid rgba(255,255,255,.08);
}

.weather-marker:hover{
  transform:scale(1.12);
}

.marker-temp{font-size:18px;font-weight:800;}
.marker-city{font-size:11px;opacity:.8;margin-top:2px;}

.marker-icon img{
  width:62px;
  height:62px;
  object-fit:contain;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.4));
}

.weather-marker.icon-mode{
  width:56px;
  height:56px;
  border-radius:18px;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:#07111f;
  z-index:999999;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

</style>
</head>

<body>

<div id="loading">Caricamento...</div>
<div id="map"></div>

<div id="topbar">
  <button class="top-btn" data-mode="temp">Temperatura</button>
<button class="top-btn" data-mode="rain">Pioggia</button>
<button class="top-btn" data-mode="wind">Vento</button>
<button class="top-btn active" data-mode="icon">Meteo</button>
</div>

<div id="timeline">
  <div id="hour-label">Ora</div>
  <input type="range" id="slider" min="0" max="23" value="12">
</div>

<script>

/* ================= ICONE ================= */

const iconUrls = {
  '01d': 'https://brymeteo.github.io/tv/Grafica/Icone/05.svg',
  '01n': 'https://brymeteo.github.io/tv/Grafica/Icone/02.svg',
  '02d': 'https://brymeteo.github.io/tv/Grafica/Icone/21.svg',
  '02n': 'https://brymeteo.github.io/tv/Grafica/Icone/22.svg',
  '03d': 'https://brymeteo.github.io/tv/Grafica/Icone/21.svg',
  '03n': 'https://brymeteo.github.io/tv/Grafica/Icone/22.svg',
  '04d': 'https://brymeteo.github.io/tv/Grafica/Icone/10.svg',
  '04n': 'https://brymeteo.github.io/tv/Grafica/Icone/11.svg',
  '45d': 'https://brymeteo.github.io/tv/Grafica/Icone/06.svg',
  '45n': 'https://brymeteo.github.io/tv/Grafica/Icone/04.svg',
  '48d': 'https://brymeteo.github.io/tv/Grafica/Icone/06.svg',
  '48n': 'https://brymeteo.github.io/tv/Grafica/Icone/04.svg',
  '51d': 'https://brymeteo.github.io/tv/Grafica/Icone/15.svg',
  '51n': 'https://brymeteo.github.io/tv/Grafica/Icone/12.svg',
  '53d': 'https://brymeteo.github.io/tv/Grafica/Icone/16.svg',
  '53n': 'https://brymeteo.github.io/tv/Grafica/Icone/13.svg',
  '55d': 'https://brymeteo.github.io/tv/Grafica/Icone/17.svg',
  '55n': 'https://brymeteo.github.io/tv/Grafica/Icone/14.svg',
  '61d': 'https://brymeteo.github.io/tv/Grafica/Icone/18.svg',
  '61n': 'https://brymeteo.github.io/tv/Grafica/Icone/18.svg',
  '63d': 'https://brymeteo.github.io/tv/Grafica/Icone/19.svg',
  '63n': 'https://brymeteo.github.io/tv/Grafica/Icone/19.svg',
  '65d': 'https://brymeteo.github.io/tv/Grafica/Icone/20.svg',
  '65n': 'https://brymeteo.github.io/tv/Grafica/Icone/20.svg',
  '71d': 'https://brymeteo.github.io/tv/Grafica/Icone/30.svg',
  '71n': 'https://brymeteo.github.io/tv/Grafica/Icone/30.svg',
  '80d': 'https://brymeteo.github.io/tv/Grafica/Icone/15.svg',
  '80n': 'https://brymeteo.github.io/tv/Grafica/Icone/12.svg',
  '95d': 'https://brymeteo.github.io/tv/Grafica/Icone/23.svg',
  '95n': 'https://brymeteo.github.io/tv/Grafica/Icone/23.svg'
};

/* ================= DATA ================= */

const MAPTILER_KEY="NZtaSdszEIjlbOcH7syp";

const CITIES = [
  { name: "Aosta", lat: 45.731, lon: 7.317, x: 13, y: 14 },
    
      { name: "Milano", lat: 45.464, lon: 9.192, x: 23, y: 16.5 },
      
      { name: "Sondrio", lat: 46.169, lon: 9.869, x: 29, y: 10 },
      
      { name: "Torino", lat: 45.071, lon: 7.687, x: 15, y: 22 },
      
      { name: "Genova", lat: 44.406, lon: 8.934, x: 23, y: 28 },
      
      { name: "Sanremo", lat: 43.818, lon: 7.761, x: 12, y: 30 },
      
      { name: "Mantova", lat: 45.152, lon: 10.774, x: 31, y: 20 },
      
      { name: "Trento", lat: 46.070, lon: 11.121, x: 38, y: 11 },
      
      { name: "Bolzano", lat: 46.493, lon: 11.334, x: 43, y: 4 },
      
      { name: "Venezia", lat: 45.439, lon: 12.331, x: 49, y: 18 },
      
      { name: "Verona", lat: 45.434, lon: 10.998, x: 40, y: 18 },
      
      { name: "Ferrara", lat: 44.827, lon: 11.621, x: 44, y: 25 },
      
      { name: "Belluno", lat: 46.149, lon: 12.216, x: 49, y: 10 },
      
      { name: "Trieste", lat: 45.667, lon: 13.767, x: 56, y: 14 },
      
      { name: "Parma", lat: 44.803, lon: 10.329, x: 34, y: 27 },
      
      { name: "Firenze", lat: 43.786, lon: 11.249, x: 41, y: 33 },
      
      { name: "Livorno", lat: 43.543, lon: 10.316, x: 33, y: 37 },
      
      { name: "Perugia", lat: 43.097, lon: 12.389, x: 48, y: 40 },
      
      { name: "Grosseto", lat: 42.771, lon: 11.108, x: 40, y: 44 },
      
      { name: "Roma", lat: 41.895, lon: 12.484, x: 49, y: 52 },
      
      { name: "L'Aquila", lat: 42.351, lon: 13.399, x: 54, y: 46 },
      
      { name: "Pescara", lat: 42.460, lon: 14.210, x: 63, y: 46 },
     
      { name: "Ancona", lat: 43.598, lon: 13.510, x: 55, y: 35 },
      
      { name: "Latina", lat: 41.464, lon: 12.897, x: 59, y: 55 },
      
      { name: "Napoli", lat: 40.883, lon: 14.417, x: 64, y: 63 },
      
      { name: "Foggia", lat: 41.461, lon: 15.549, x: 70, y: 54 },
      
      { name: "Potenza", lat: 40.644, lon: 15.809, x: 74, y: 64 },
      
      { name: "Bari", lat: 41.118, lon: 16.851, x: 82, y: 59 },
      
      { name: "Taranto", lat: 40.417, lon: 17.240, x: 88, y: 66 },
      
      { name: "Cosenza", lat: 39.310, lon: 16.250, x: 77, y: 73 },
      
      { name: "Reggio Calabria", lat: 38.111, lon: 15.661, x: 71, y: 85 },
      
      { name: "Catanzaro", lat: 38.891, lon: 16.599, x: 81, y: 80 },
       
      { name: "Catania", lat: 37.502, lon: 15.087, x: 67, y: 93 },
      
      { name: "Agrigento", lat: 37.450, lon: 13.500, x: 57, y: 93 },
      
      { name: "Palermo", lat: 38.116, lon: 13.360, x: 55, y: 86 },
      
      { name: "Sassari", lat: 40.730, lon: 8.551, x: 22, y: 61 },
      
      { name: "Cagliari", lat: 39.213, lon: 9.130, x: 22, y: 74 },
      
      { name: "Arbatax", lat: 39.926, lon: 9.701, x: 29, y: 67 },
];

let map;
let weatherData={};
let markers=[];
let currentMode="icon";

/* ================= ORA ITALIA ================= */

function getItalyHour(){
  const now=new Date();
  const italy=new Date(now.toLocaleString("en-US",{timeZone:"Europe/Rome"}));
  return italy.getHours();
}

/* ================= ICON LOGIC ================= */

function isNight(hour){
  return hour<6 || hour>18;
}

function getIcon(code,hour){

  const night=isNight(hour);
  const suffix=night?"n":"d";

  let base="03";

  if(code===0)base="01";
  else if(code<=2)base="02";
  else if(code<=3)base="04";
  else if(code<=48)base="45";
  else if(code<=55)base="53";
  else if(code<=65)base="63";
  else if(code<=77)base="71";
  else if(code<=82)base="80";
  else if(code>=95)base="95";

  return iconUrls[base+suffix]||iconUrls["01d"];
}

/* ================= MAP ================= */

map=new maplibregl.Map({
  container:"map",
  style:{
    version:8,
    sources:{
  base:{
    type:"raster",
    tiles:[
      "https://api.meteo7.it/mapbox/styles/v1/cjnhzyvlx2svx2so6faitezd4/tiles/{z}/{x}/{y}"
    ],
    tileSize:256
  }
},
    layers:[{id:"base",type:"raster",source:"base"}]
  },
  center:[11.5,42],
  zoom:5.0,
  pitch:01
});

/* ================= WEATHER ================= */

async function loadWeather(){
  for(const c of CITIES){
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=temperature_2m,precipitation,windspeed_10m,weathercode&timezone=Europe/Rome`;
    const r=await fetch(url);
    const d=await r.json();
    weatherData[c.name]=d.hourly;
  }
}

/* ================= MARKERS ================= */

function clearMarkers(){
  markers.forEach(m=>m.remove());
  markers=[];
}

function buildMarkers(hour){

  clearMarkers();

  for(const c of CITIES){

    const d=weatherData[c.name];
    if(!d)continue;

    const temp=Math.round(d.temperature_2m[hour]);
    const rain=d.precipitation[hour];
    const wind=Math.round(d.windspeed_10m[hour]);
    const code=d.weathercode[hour];

    let value="";
    if(currentMode==="temp")value=`${temp}°`;
    else if(currentMode==="rain")value=`${rain} mm`;
    else if(currentMode==="wind")value=`${wind}`;

    const el=document.createElement("div");
    el.className="weather-marker";

    if(currentMode==="icon")el.classList.add("icon-mode");

    el.innerHTML=currentMode==="icon"
      ? `<div class="marker-icon"><img src="${getIcon(code,hour)}"></div>`
      : `<div class="marker-icon"><img src="${getIcon(code,hour)}"></div>
         <div class="marker-temp">${value}</div>
         <div class="marker-city">${c.name}</div>`;

    new maplibregl.Marker({element:el,anchor:"center"})
      .setLngLat([c.lon,c.lat])
      .addTo(map);

    markers.push(el);
  }
}

/* ================= UI ================= */

document.querySelectorAll(".top-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".top-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    currentMode=b.dataset.mode;
    buildMarkers(currentHour);
  };
});

/* ================= INIT ================= */

let currentHour=getItalyHour();

document.getElementById("slider").value=currentHour;
document.getElementById("hour-label").innerText=`Ora: ${currentHour}:00`;

document.getElementById("slider").oninput=(e)=>{
  currentHour=+e.target.value;
  document.getElementById("hour-label").innerText=`Ora: ${currentHour}:00`;
  buildMarkers(currentHour);
};

(async()=>{
  await loadWeather();
  buildMarkers(currentHour);
  document.getElementById("loading").style.display="none";
})();

/* auto sync ogni minuto */
setInterval(()=>{
  currentHour=getItalyHour();
  document.getElementById("slider").value=currentHour;
  document.getElementById("hour-label").innerText=`Ora: ${currentHour}:00`;
  buildMarkers(currentHour);
},60000);

</script>

</body>
</html>
