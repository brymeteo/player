<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; font-family:Inter,system-ui,sans-serif; background:#d7dde5; }

#days-container{
  position:fixed; top:0; left:0; right:0; z-index:3000;
  display:flex; gap:22px; align-items:center;
  padding:14px 18px; background:#d7dde5;
  border-bottom:1px solid rgba(0,0,0,.12);
  overflow-x:auto; scrollbar-width:none;
}
#days-container::-webkit-scrollbar{ display:none; }
.day-btn{
  border:none; background:none; font-size:16px; font-weight:700;
  color:#2b2b2b; cursor:pointer; padding-bottom:10px;
  position:relative; white-space:nowrap;
}
.day-btn.active{ color:#1565c0; }
.day-btn.active::after{
  content:""; position:absolute; left:0; right:0; bottom:-10px;
  height:3px; border-radius:999px; background:#1565c0;
}

#map{ position:absolute; top:60px; left:0; right:0; bottom:0; }

#watermark{
  position:absolute; bottom:150px; right:30px; z-index:1500;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  pointer-events:none; user-select:none;
}
#watermark img{
  width:52px; height:52px; object-fit:contain;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)); opacity:.92;
}
#watermark-text{
  font-size:10px; font-weight:700; color:white; text-align:center;
  line-height:1.3; text-shadow:0 1px 4px rgba(0,0,0,.7), 0 0 8px rgba(0,0,0,.5);
  letter-spacing:.3px;
}

#topbar{
  position:absolute; top:80px; left:50%; transform:translateX(-50%);
  z-index:2000; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  width:min(92vw,720px);
}
.top-btn{
  border:none; background:rgba(255,255,255,.95); color:#2b2b2b;
  padding:14px 20px; border-radius:999px; font-size:15px; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:.2s;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.top-btn.active{ background:#d9ecff; color:#1358a8; border:2px solid #5ea9ff; }

#cache-badge{
  font-size:10px; font-weight:700;
  color:#555; display:inline;
}
#cache-badge.fresh{ color:#1a7a1a; }
#cache-badge.cached{ color:#b86c00; }

#timeline{
  position:absolute; left:50%; bottom:28px; transform:translateX(-50%);
  z-index:2000; width:min(1100px,92vw);
  background:rgba(255,255,255,.95); border-radius:22px;
  padding:20px 28px 18px; box-shadow:0 12px 40px rgba(0,0,0,.16);
}
#current-hour-label{
  text-align:center; font-size:15px; font-weight:700;
  color:#1565c0; margin-bottom:12px;
}
#slider-wrap{ position:relative; }
input[type=range]{
  appearance:none; -webkit-appearance:none; width:100%; height:8px;
  border-radius:999px; background:#d3d7dc; outline:none; cursor:pointer; display:block;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
  background:white; border:4px solid #1565c0; cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
input[type=range]::-moz-range-thumb{
  width:26px; height:26px; border-radius:50%;
  background:white; border:4px solid #1565c0; cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
#tick-ruler{
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-top:6px; padding:0 13px;
}
.tick-wrap{ display:flex; flex-direction:column; align-items:center; flex:0 0 calc(100% / 23); }
.tick-wrap:first-child{ align-items:flex-start; }
.tick-wrap:last-child { align-items:flex-end; }
.tick{ width:1.5px; background:#b0b8c4; }
.tick.major{ height:10px; background:#6b7a8d; }
.tick.minor{ height:6px; }
.tick-label{ font-size:13px; font-weight:700; color:#2b2b2b; margin-top:4px; white-space:nowrap; line-height:1; }

#loading{
  position:fixed; inset:0; z-index:9000;
  background:rgba(215,221,229,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px;
}
#loading.hidden{ display:none; }
.spinner{
  width:48px; height:48px; border:5px solid #ccc;
  border-top-color:#1565c0; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
#loading p{ font-size:15px; font-weight:700; color:#333; }

@media(max-width:768px){
  #days-container{ gap:16px; padding:12px 14px; }
  #map{ top:56px; }
  #topbar{ top:76px; width:95vw; }
  .top-btn{ flex:1; min-width:110px; font-size:13px; padding:12px 10px; }
  .tick-label{ font-size:11px; }
  #watermark{ bottom:150px; right:10px; }
  #watermark img{ width:54px; height:54px; }
}
@media(max-width:480px){
  #topbar{ top:72px; gap:8px; }
  .top-btn{ min-width:90px; font-size:12px; }
  .tick-label{ font-size:10px; }
}

.weather-marker{ width:74px; display:flex; flex-direction:column; align-items:center; color:white; text-align:center; }
.marker-icon img{ width:68px; height:68px; object-fit:contain; filter:drop-shadow(0 3px 6px rgba(0,0,0,.35)); }
.weather-circle{
  width:58px; height:58px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:white; box-shadow:0 3px 8px rgba(0,0,0,.35); font-size:16px;
}
.marker-city{ font-size:17px; opacity:.95; margin-top:4px; text-align:center; }
.temp-hot  { background:linear-gradient(135deg,#ff4d4d,#ff9900); }
.temp-warm { background:linear-gradient(135deg,#ffb347,#ff4d4d); }
.temp-cold { background:linear-gradient(135deg,#0f4778,#00f2fe8c); }
.rain      { background:linear-gradient(135deg,#4facfe61,#5c6e80); }
.hide-label .marker-city{ display:none; }
</style>
</head>

/* ============================================================
   FIX 1 — getItalianHour() robusto (no ambiguità "24")
   Usa Intl.DateTimeFormat che restituisce sempre 0-23
   ============================================================ */
function getItalianHour(){
  const now  = new Date();
  const fmt  = new Intl.DateTimeFormat("it-IT", {
    timeZone: "Europe/Rome",
    hour: "2-digit",
    hour12: false
  });
  const h = parseInt(fmt.format(now), 10);
  // Intl può restituire 24 in edge-case: normalizza
  return (isNaN(h) || h === 24) ? 0 : h;
}

/* ============================================================
   FIX 2 — getItalianDateString() → "YYYY-MM-DD" in fuso italiano
   Usata per confrontare con le date dell'array API
   ============================================================ */
function getItalianDateString(offsetDays = 0){
  const now = new Date();
  now.setDate(now.getDate() + offsetDays);
  // formatta in fuso europeo
  return new Intl.DateTimeFormat("sv-SE", {  // sv-SE → formato ISO YYYY-MM-DD nativo
    timeZone: "Europe/Rome"
  }).format(now);  // es. "2024-06-15"
}

/* ============================================================
   FIX 3 — getHourIndex(): calcola l'indice nell'array API
   in modo robusto, cercando il timestamp corretto
   nell'array "time" restituito dall'API invece di fare
   aritmetica cieca (day*24+hour).
   ============================================================ */
function getHourIndex(hourlyData, dayOffset, hour){
  if(!hourlyData || !hourlyData.time) return dayOffset * 24 + hour; // fallback

  const targetDate = getItalianDateString(dayOffset);
  // I timestamp API hanno formato "YYYY-MM-DDTHH:00" — cerca la corrispondenza esatta
  const target = `${targetDate}T${String(hour).padStart(2,"0")}:00`;
  const idx = hourlyData.time.indexOf(target);
  if(idx !== -1) return idx;

  // Fallback: se non trovato (non dovrebbe succedere), usa aritmetica
  return dayOffset * 24 + hour;
}

map.on("zoomend", buildMarkers);
map.on("moveend", buildMarkers);

map.on("load", () => {
  const inner = document.querySelector(".maplibregl-ctrl-attrib-inner");
  if(!inner) return;
  inner.innerHTML = '<a href="https://brymeteo.webnode.it" target="_blank">© BryMeteo</a>';
  if(window._badgeState){
    updateCacheBadge(window._badgeState.fromCache, window._badgeState.ts);
  }
});

/* ============================================================
   CACHE localStorage
   ============================================================ */
function cacheLoad(){
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    const age = Date.now() - obj.ts;
    if(age > CACHE_TTL_MS) return null;
    return obj;
  } catch(e){ return null; }
}

function cacheSave(data){
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch(e){}
}

function updateCacheBadge(fromCache, ts){
  window._badgeState = { fromCache, ts };
  function inject(){
    const inner = document.querySelector(".maplibregl-ctrl-attrib-inner");
    if(!inner) return false;
    let badge = inner.querySelector("#cache-badge");
    if(!badge){
      badge = document.createElement("span");
      badge.id = "cache-badge";
      inner.appendChild(document.createTextNode(" · "));
      inner.appendChild(badge);
    }
    if(fromCache){
      const mins = Math.round((Date.now()-ts)/60000);
      const next = Math.max(0, Math.round((CACHE_TTL_MS-(Date.now()-ts))/60000));
      badge.textContent = `📦 cache ${mins}m · rinnovo in ${next}m`;
      badge.className = "cached";
    } else {
      badge.textContent = "🌐 dati freschi";
      badge.className = "fresh";
    }
    return true;
  }
  if(!inject()) setTimeout(inject, 1000);
}

/* ============================================================
   FETCH BATCH
   ============================================================ */
async function fetchAllCities(){
  const lats = CITIES.map(c => c.lat).join(",");
  const lons = CITIES.map(c => c.lon).join(",");

  const url = "https://api.open-meteo.com/v1/forecast"
    + `?latitude=${lats}`
    + `&longitude=${lons}`
    + "&hourly=temperature_2m,precipitation,weathercode"
    + "&forecast_days=8"
    + "&timezone=Europe%2FRome";

  document.getElementById("loading-msg").textContent = "Download dati meteo… (1 chiamata API)";
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const json = await r.json();

  const results = Array.isArray(json) ? json : [json];

  const data = {};
  results.forEach((item, i) => {
    // Salviamo l'intero oggetto hourly, incluso "time", per il lookup robusto
    data[CITIES[i].name] = item.hourly;
  });
  return data;
}

/* ============================================================
   CARICAMENTO PRINCIPALE (con cache)
   ============================================================ */
async function loadWeather(){
  const cached = cacheLoad();
  if(cached){
    weatherData = cached.data;
    updateCacheBadge(true, cached.ts);
    return;
  }
  weatherData = await fetchAllCities();
  cacheSave(weatherData);
  updateCacheBadge(false, Date.now());
}

/* ============================================================
   RINNOVO AUTOMATICO CACHE ogni 3 ore
   ============================================================ */
setInterval(async () => {
  const cached = cacheLoad();
  if(cached) return;
  try {
    weatherData = await fetchAllCities();
    cacheSave(weatherData);
    updateCacheBadge(false, Date.now());
    buildMarkers();
  } catch(e){ console.warn("Rinnovo cache fallito:", e); }
}, 5 * 60 * 1000);

/* ============================================================
   ICONA
   ============================================================ */
function getIcon(code, hour){
  const suffix = isNightHour(hour) ? "n" : "d";
  let base="03";
  if(code===0)      base="01";
  else if(code<=2)  base="02";
  else if(code<=3)  base="03";
  else if(code<=48) base="45";
  else if(code<=55) base="53";
  else if(code<=65) base="63";
  else if(code<=77) base="71";
  else if(code<=82) base="80";
  else if(code>=95) base="95";
  return iconUrls[base+suffix]||iconUrls["01d"];
}

/* ============================================================
   MARKERS — usa getHourIndex() per indice corretto
   ============================================================ */
function clearMarkers(){ markers.forEach(m=>m.remove()); markers=[]; }

function getTempColor(t){
  if(t>=28) return "temp-hot";
  if(t>=13) return "temp-warm";
  return "temp-cold";
}

function buildMarkers(){
  clearMarkers();
  const zoom = map.getZoom();
  const vis  = CITIES.filter(c => zoom >= c.minZoom);

  for(const c of vis){
    const d = weatherData[c.name];
    if(!d) continue;

    // FIX PRINCIPALE: indice calcolato cercando il timestamp nell'array API
    const index = getHourIndex(d, currentDay, currentHour);

    const temp = Math.round(d.temperature_2m[index]);
    const rain = d.precipitation[index];
    const code = d.weathercode[index];

    const el = document.createElement("div");
    const showLabel = zoom >= LABEL_ZOOM;
    el.className = "weather-marker" + (showLabel ? "" : " hide-label");

    let html = "";
    if(currentMode === "icon"){
      html = `<div class="marker-icon"><img src="${getIcon(code,currentHour)}"></div><div class="marker-city">${c.name}</div>`;
    } else if(currentMode === "temp"){
      html = `<div class="weather-circle ${getTempColor(temp)}">${temp}°</div><div class="marker-city">${c.name}</div>`;
    } else {
      html = `<div class="weather-circle rain">${rain}</div><div class="marker-city">${c.name}</div>`;
    }
    el.innerHTML = html;
    markers.push(new maplibregl.Marker({element:el,anchor:"center"}).setLngLat([c.lon,c.lat]).addTo(map));
  }
}

/* ============================================================
   TICK RULER
   ============================================================ */
function buildTickRuler(){
  const ruler = document.getElementById("tick-ruler");
  ruler.innerHTML = "";
  for(let h=0;h<24;h++){
    const isMajor=(h%6===0);
    const wrap=document.createElement("div"); wrap.className="tick-wrap";
    const tick=document.createElement("div"); tick.className="tick "+(isMajor?"major":"minor");
    wrap.appendChild(tick);
    if(isMajor){
      const lbl=document.createElement("div"); lbl.className="tick-label";
      lbl.textContent=BAND_LABELS[h]; wrap.appendChild(lbl);
    }
    ruler.appendChild(wrap);
  }
}

/* ============================================================
   ORA LABEL + SLIDER
   ============================================================ */
function updateHourLabel(h){
  document.getElementById("current-hour-label").textContent=String(h).padStart(2,"0")+":00";
}
function setSliderHour(h){
  currentHour=h;
  document.getElementById("hour-slider").value=h;
  updateHourLabel(h);
}

/* ============================================================
   AUTO CLOCK (ogni 60s) — FIX: confronta anche la data
   ============================================================ */
function syncClock(){
  if(!autoTracking || currentDay !== 0) return;
  const h = getItalianHour();
  if(h !== currentHour){
    setSliderHour(h);
    buildMarkers();
  }
}
setInterval(syncClock, 60000);

/* ============================================================
   SLIDER
   ============================================================ */
document.getElementById("hour-slider").addEventListener("input", function(){
  autoTracking = false;
  currentHour  = +this.value;
  updateHourLabel(currentHour);
  buildMarkers();
});

/* ============================================================
   DAYS — FIX: "Oggi" mostra la data italiana corretta
   ============================================================ */
function buildDays(){
  const container = document.getElementById("days-container");
  container.innerHTML = "";

  // Data di riferimento in fuso italiano (evita ambiguità mezzanotte UTC)
  const nowItaly = new Date(
    new Intl.DateTimeFormat("sv-SE", { timeZone:"Europe/Rome" }).format(new Date()) + "T00:00:00"
  );

  for(let i=0;i<8;i++){
    const date = new Date(nowItaly);
    date.setDate(date.getDate() + i);

    const label = i === 0
      ? "Oggi"
      : date.toLocaleDateString("it-IT", { weekday:"short", day:"numeric" });

    const btn = document.createElement("button");
    btn.className = "day-btn" + (i===0 ? " active" : "");
    btn.innerText  = label;
    btn.onclick = () => {
      currentDay = i;
      autoTracking = (i === 0); // riabilita auto-tracking solo su "Oggi"
      document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if(i === 0 && autoTracking) setSliderHour(getItalianHour());
      buildMarkers();
    };
    container.appendChild(btn);
  }
}

/* ============================================================
   MODE BUTTONS
   ============================================================ */
document.querySelectorAll(".top-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".top-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentMode=btn.dataset.mode;
    buildMarkers();
  };
});

/* ============================================================
   INIT
   ============================================================ */
buildTickRuler();
buildDays();
const startHour = getItalianHour();
setSliderHour(startHour);

(async()=>{
  try{
    await loadWeather();
  }catch(e){
    document.getElementById("loading-msg").textContent="Errore caricamento dati. Ricarica la pagina.";
    console.error(e);
    return;
  }
  document.getElementById("loading").classList.add("hidden");
  buildMarkers();
})();

</script>
